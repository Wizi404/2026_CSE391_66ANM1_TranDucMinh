          <label><input type="radio" name="gender" value="N·ªØ"> N·ªØ</label>

  <script>
    const form=document.getElementById("registerForm")
    const successMessage=document.getElementById("successMessage")
    const fullname=document.getElementById("fullname")
    const email=document.getElementById("email")
    const phone=document.getElementById("phone")
    const password=document.getElementById("password")
    const confirmPassword=document.getElementById("confirmPassword")
    const terms=document.getElementById("terms")
    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/
    const phoneRegex=/^0[0-9]{9}$/
    const passwordRegex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/
    const fullnameRegex=/^[a-zA-Z√Ä-·ªπ\s]+$/
    function showError(fieldId,message){
      const field=document.getElementById(fieldId)
      const error=document.getElementById(fieldId+"-error")
      error.textContent=message
      field.classList.remove("valid")
      field.classList.add("invalid")
    }
    function clearError(fieldId){
      const field=document.getElementById(fieldId)
      const error=document.getElementById(fieldId+"-error")
      error.textContent=""
      field.classList.remove("invalid")
      field.classList.add("valid")
    }
    function showGroupError(errorId,message){

    function clearGroupError(errorId){

    }
    function validateFullname(){
      const value=fullname.value.trim()
      if(value===""){
        showError("fullname","H·ªç v√Ý t√™n kh√¥ng ƒë∆∞·ª£c ƒë·ªÉ tr·ªëng")
        return false

      if(value.length<3){
        showError("fullname","H·ªç v√Ý t√™n ph·∫£i c√≥ √≠t nh·∫•t 3 k√Ω t·ª±")
        return false

      if(!fullnameRegex.test(value)){
        showError("fullname","H·ªç v√Ý t√™n ch·ªâ ƒë∆∞·ª£c ch·ª©a ch·ªØ c√°i v√Ý kho·∫£ng tr·∫Øng")
        return false

    }
    function validateEmail(){

      if(value===""){

    function validatePhone(){

    function validatePassword(){

    function validateConfirmPassword(){

      if(value===""){
        showError("confirmPassword","Vui l√≤ng x√°c nh·∫≠n m·∫≠t kh·∫©u")
        return false
      }
      if(value!==password.value){
        showError("confirmPassword","M·∫≠t kh·∫©u x√°c nh·∫≠n kh√¥ng kh·ªõp")
        return false

      clearError("confirmPassword")

    }
    function validateGender(){

      if(!gender){

        return false

      clearGroupError("gender-error")

    }
    function validateTerms(){
      if(!terms.checked){
        showGroupError("terms-error","B·∫°n ph·∫£i ƒë·ªìng √Ω v·ªõi ƒëi·ªÅu kho·∫£n")
        return false

      clearGroupError("terms-error")

    }
    fullname.addEventListener("blur",validateFullname)
    email.addEventListener("blur",validateEmail)
    phone.addEventListener("blur",validatePhone)
    password.addEventListener("blur",validatePassword)
    confirmPassword.addEventListener("blur",validateConfirmPassword)
    fullname.addEventListener("input",()=>{document.getElementById("fullname-error").textContent="";fullname.classList.remove("invalid","valid")})
    email.addEventListener("input",()=>{document.getElementById("email-error").textContent="";email.classList.remove("invalid","valid")})
    phone.addEventListener("input",()=>{document.getElementById("phone-error").textContent="";phone.classList.remove("invalid","valid")})
    password.addEventListener("input",()=>{document.getElementById("password-error").textContent="";password.classList.remove("invalid","valid")})
    confirmPassword.addEventListener("input",()=>{document.getElementById("confirmPassword-error").textContent="";confirmPassword.classList.remove("invalid","valid")})

    document.querySelectorAll('input[name="gender"]').forEach(item=>{

    })
    terms.addEventListener("change",()=>clearGroupError("terms-error"))
    form.addEventListener("submit",function(event){

        validateGender() &
        validateTerms()
      if(isValid){

        successMessage.textContent=`ƒêƒÉng k√Ω th√Ýnh c√¥ng! üéâ Ch√Ýo m·ª´ng ${fullname.value.trim()}`

    })
  </script>
</body>
</html>
