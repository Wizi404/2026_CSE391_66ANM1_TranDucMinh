<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form đăng ký nâng cấp</title>
  <link rel="stylesheet" href="Bai3.1.css">
</head>
<body>
  <div class="container">
    <form id="registerForm">
      <h2>Đăng ký tài khoản</h2>

      <div class="form-group">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" maxlength="50">
        <div class="meta-row">
          <span class="error" id="fullname-error"></span>
          <span class="count" id="fullname-count">0/50</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email">
        <span class="error" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="phone">Số điện thoại</label>
        <input type="text" id="phone">
        <span class="error" id="phone-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="password">
          <button type="button" class="toggle-btn" id="togglePassword">👁</button>
        </div>
        <div class="strength">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText">Chưa nhập mật khẩu</div>
        <span class="error" id="password-error"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword">
          <button type="button" class="toggle-btn" id="toggleConfirmPassword">👁</button>
        </div>
        <span class="error" id="confirmPassword-error"></span>
      </div>

      <div class="form-group">
        <label>Giới tính</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Nam"> Nam</label>
          <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
          <label><input type="radio" name="gender" value="Khác"> Khác</label>
        </div>
        <span class="error" id="gender-error"></span>
      </div>

      <div class="form-group">
        <label class="terms-label"><input type="checkbox" id="terms"> Tôi đồng ý với điều khoản</label>
        <span class="error" id="terms-error"></span>
      </div>

      <button type="submit" class="submit-btn">Đăng ký</button>
    </form>

    <div class="success" id="successMessage"></div>
  </div>

  <script src="Bai3.1.js"></script>
</body>
</html>
