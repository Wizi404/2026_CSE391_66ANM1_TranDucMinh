<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form đăng ký nhiều bước</title>
  <link rel="stylesheet" href="Bai3.2.css">
</head>
<body>
  <div class="container">
    <h2>Đăng ký tài khoản</h2>

    <div class="progress-wrap">
      <div class="progress-text" id="progressText">Bước 1 / 3</div>
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <form id="multiStepForm">
      <div class="step active" id="step1">
        <h3>Bước 1 – Thông tin cá nhân</h3>

        <div class="form-group">
          <label for="fullname">Họ tên</label>
          <input type="text" id="fullname">
          <span class="error" id="fullname-error"></span>
        </div>

        <div class="form-group">
          <label for="birthday">Ngày sinh</label>
          <input type="date" id="birthday">
          <span class="error" id="birthday-error"></span>
        </div>

        <div class="form-group">
          <label>Giới tính</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="Nam"> Nam</label>
            <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
            <label><input type="radio" name="gender" value="Khác"> Khác</label>
          </div>
          <span class="error" id="gender-error"></span>
        </div>

        <div class="actions right">
          <button type="button" id="next1">Tiếp theo</button>
        </div>
      </div>

      <div class="step" id="step2">
        <h3>Bước 2 – Thông tin tài khoản</h3>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" id="email">
          <span class="error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password">
          <span class="error" id="password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword">
          <span class="error" id="confirmPassword-error"></span>
        </div>

        <div class="actions">
          <button type="button" class="secondary" id="back1">Quay lại</button>
          <button type="button" id="next2">Tiếp theo</button>
        </div>
      </div>

      <div class="step" id="step3">
        <h3>Bước 3 – Xác nhận</h3>

        <div class="summary" id="summaryBox"></div>

        <div class="actions">
          <button type="button" class="secondary" id="back2">Quay lại</button>
          <button type="submit">Hoàn tất đăng ký</button>
        </div>
      </div>
    </form>

    <div class="success" id="successMessage"></div>
  </div>

  <script src="Bai3.2.js"></script>
</body>
</html>
