<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập Async Await</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:20px;background:#f5f5f5}
    h1{text-align:center}
    .box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
    button{padding:10px 16px;border:none;background:#007bff;color:#fff;border-radius:6px;cursor:pointer;margin-bottom:20px}
    button:hover{background:#0056b3}
    .user{padding:12px;margin-bottom:10px;background:#eee;border-radius:8px}
    .error{color:red;font-weight:bold}
  </style>
</head>
<body>
  <h1>Bài tập Async/Await + Fetch API</h1>

  <div class="box">
    <button id="loadBtn">Lấy danh sách người dùng</button>
    <p id="status"></p>
    <div id="userList"></div>
  </div>

  <script>
    const loadBtn = document.getElementById("loadBtn");
    const status = document.getElementById("status");
    const userList = document.getElementById("userList");

    function moPhongPromise() {
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve("Đã xử lý xong Promise bằng async/await");
        }, 1500);
      });
    }

    async function demoAsyncAwait() {
      const result = await moPhongPromise();
      console.log(result);
    }

    demoAsyncAwait();

    async function layNguoiDung() {
      status.textContent = "Đang tải dữ liệu...";
      userList.innerHTML = "";

      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users");

        if (!response.ok) {
          throw new Error("Không thể kết nối đến API");
        }

        const data = await response.json();

        status.textContent = "Lấy dữ liệu thành công";

        data.forEach(user => {
          const div = document.createElement("div");
          div.classList.add("user");
          div.innerHTML = `
            <strong>Tên:</strong> ${user.name}<br>
            <strong>Email:</strong> ${user.email}<br>
            <strong>SĐT:</strong> ${user.phone}<br>
            <strong>Thành phố:</strong> ${user.address.city}
          `;
          userList.appendChild(div);
        });
      } catch (error) {
        status.innerHTML = `<span class="error">Lỗi: ${error.message}</span>`;
      }
    }

    loadBtn.addEventListener("click", layNguoiDung);
  </script>
</body>
</html>
